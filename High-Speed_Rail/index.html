<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>&#39640;&#37941;&#33258;&#21205;&#35330;&#31080;&#35373;&#23450;</title>
<style>
  .switch {
    position: relative;
    display: inline-block;
    width: 52px;
    height: 28px;
    margin-top: 6px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #ccc;
    transition: 0.4s;
    border-radius: 34px;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.4s;
    border-radius: 50%;
  }

  .switch input:checked + .slider {
    background-color: #ff6600;
  }

  .switch input:checked + .slider:before {
    transform: translateX(24px);
  }

  .switch-label {
    display: block;
    font-weight: bold;
    margin-top: 20px;
  }

  body {
    font-family: Arial, sans-serif;
    padding: 15px;
    background: #f9f9f9;
  }

  .container {
    width: 330px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-sizing: border-box;
  }

  label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
  }

  input,
  select {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  .time-range,
  .reload-range {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .time-range label,
  .reload-range label {
    margin-top: 0;
  }

  button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>
